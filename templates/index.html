<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blower Fault Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <div class="container mt-5">
        <h2 class="text-center mb-4">Industrial Blower Monitoring System</h2>
        <div class="card bg-secondary p-4 shadow-lg">
            <form action="/predict" method="post">
                <div class="row text-white">
                    <div class="col-md-6 mb-3">
                        <label>Temperature (°C)</label>
                        <input type="number" step="0.1" name="temp" class="form-control" placeholder="e.g. 45" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Vibration (mm/s)</label>
                        <input type="number" step="0.1" name="vib" class="form-control" placeholder="e.g. 1.2" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Voltage (V)</label>
                        <input type="number" step="1" name="volt" class="form-control" placeholder="e.g. 415" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Current (A)</label>
                        <input type="number" step="0.1" name="curr" class="form-control" placeholder="e.g. 10" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-warning w-100 mt-3"><b>ANALYZE MACHINE HEALTH</b></button>
            </form>
            
            {% if prediction_text %}
            <div class="alert alert-{{ alert_type }} mt-4 text-center border-0">
                <h2 class="fw-bold">{{ prediction_text }}</h2>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
